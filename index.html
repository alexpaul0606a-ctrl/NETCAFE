<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISP Support</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="manifest" href="manifest.json">

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#0dcaf0);
font-family:sans-serif;
}

.card{
width:320px;
border-radius:20px;
color:#333;
}

.btn{
border-radius:10px;
font-weight:500;
}
</style>

</head>

<body>

<div class="card shadow p-4 text-center bg-white">

<h3 class="mb-3">📞 Support Center</h3>

<p class="text-muted">We are here to help you</p>

<a href="https://wa.me/8801748637690" 
class="btn btn-success w-100 mb-2">
💬 WhatsApp Support
</a>

<a href="https://m.me/netcafedivisionalisp" 
class="btn btn-primary w-100 mb-2">
📩 Messenger Support
</a>

<a href="tel:+8801748637690" 
class="btn btn-dark w-100 mb-2">
📞 Call Now
</a>

<button class="btn btn-outline-secondary w-100 mt-2" id="installBtn">
⬇ Install App
</button>

</div>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
});

document.getElementById('installBtn').addEventListener('click', async () => {
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
}
});

// service worker
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
